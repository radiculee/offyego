name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit arrives on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

      - name: Run build
        run: npm run build
        env:
          # Dummy value satisfies build-time URL interpolation without
          # contacting Mapbox. Real token lives in Vercel env vars only.
          NEXT_PUBLIC_MAPBOX_TOKEN: dummy_token_for_ci_build

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint
